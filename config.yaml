packages:
  shell:
    emoji: 🐚
    tools:
      - name: starship
        description: Fast and customizable prompt
        type: formula
        sync:
          files:
            - source: ~/.config/starship.toml

      - name: zoxide
        description: Smarter cd with directory history
        type: formula

      - name: fzf
        description: Fuzzy finder for files, history and more
        type: formula

      - name: eza
        description: Modern replacement for ls
        type: formula

      - name: bat
        description: cat with syntax highlighting
        type: formula

      - name: ripgrep
        description: Fast grep that respects .gitignore
        type: formula

      - name: fd
        description: Simple and fast alternative to find
        type: formula

      - name: tldr
        description: Practical command examples instead of man pages
        type: formula

      - name: htop
        description: Interactive process monitor
        type: formula

      - name: jq
        description: JSON processor for the terminal
        type: formula

  git:
    emoji: 🌿
    tools:
      - name: git
        description: Version control system
        type: formula
        core: true
        sync:
          files:
            - source: ~/.gitconfig

      - name: gh
        description: GitHub CLI
        type: formula
        required: true

      - name: lazygit
        description: Terminal UI for git
        type: formula

      - name: git-delta
        description: Syntax highlighting for git diffs
        type: formula

  editors:
    emoji: ✏️
    tools:
      - name: neovim
        description: Hyperextensible modal editor
        type: formula

      - name: vscodium
        description: VS Code without Microsoft telemetry
        type: cask
        sync:
          files:
            - source: ~/Library/Application Support/VSCodium/User/settings.json
            - source: ~/Library/Application Support/VSCodium/User/keybindings.json

      - name: cursor
        description: AI-first code editor
        type: cask

  terminal:
    emoji: 🖥️
    tools:
      - name: ghostty
        description: Fast and feature-rich terminal emulator
        type: cask
        sync:
          files:
            - source: ~/.config/ghostty/config

  browsers:
    emoji: 🌐
    tools:
      - name: google-chrome
        description: Google Chrome
        type: cask

      - name: firefox
        description: Mozilla Firefox
        type: cask

      - name: brave-browser
        description: Privacy-focused browser
        type: cask

  containers:
    emoji: 🐳
    tools:
      - name: docker-desktop
        description: Containers and Kubernetes for macOS
        type: cask

  ai:
    emoji: 🤖
    tools:
      - name: ollama-app
        description: Run LLMs locally
        type: cask

      - name: claude-code
        description: Agentic AI coding CLI by Anthropic
        type: cask
        required: true

  runtimes:
    emoji: ⚙️
    tools:
      - name: proto
        description: Toolchain and runtime version manager
        type: formula
        core: true

      - name: node
        description: JavaScript runtime
        installer: proto
        version: lts
        core: true

      - name: pnpm
        description: Fast, disk space efficient package manager
        installer: proto
        required: true

  dotfiles:
    emoji: 📦
    tools:
      - name: chezmoi
        description: Dotfile manager
        type: formula
        core: true

  databases:
    emoji: 🗄️
    tools:
      - name: beekeeper-studio
        description: SQL editor and database manager
        type: cask

  api:
    emoji: 🔌
    tools:
      - name: httpie
        description: Modern HTTP client for the terminal
        type: formula

  productivity:
    emoji: ⚡
    tools:
      - name: hammerspoon
        description: macOS automation with Lua scripting
        type: cask
        sync:
          files:
            - source: ~/.hammerspoon/init.lua

      - name: raycast
        description: Spotlight replacement with extensions
        type: cask

      - name: rectangle
        description: Window manager via keyboard shortcuts
        type: cask

      - name: notion
        description: All-in-one workspace
        type: cask

      - name: vlc
        description: Open source media player
        type: cask

  zsh:
    emoji: 🐚
    tools:
      - name: zsh
        description: Z shell configuration
        core: true
        sync:
          files:
            - source: ~/.zshrc
